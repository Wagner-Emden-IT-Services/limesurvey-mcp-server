services:
  limesurvey-mcp:
    build: .
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      LIMESURVEY_URL: ${LIMESURVEY_URL}
      LIMESURVEY_USERNAME: ${LIMESURVEY_USERNAME}
      LIMESURVEY_PASSWORD: ${LIMESURVEY_PASSWORD}
      LIMESURVEY_AUTH_PLUGIN: ${LIMESURVEY_AUTH_PLUGIN:-Authdb}
      LIMESURVEY_READ_ONLY: ${LIMESURVEY_READ_ONLY:-true}
      LIMESURVEY_EXPORT_DIR: /data/exports
      LIMESURVEY_THEME_DIR: /data/themes
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
      MCP_HTTP_BEARER_TOKEN: ${MCP_HTTP_BEARER_TOKEN:?set MCP_HTTP_BEARER_TOKEN}
      MCP_HTTP_ALLOWED_HOSTS: ${MCP_HTTP_ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - limesurvey_exports:/data/exports
      - limesurvey_themes:/data/themes

volumes:
  limesurvey_exports:
  limesurvey_themes:
